<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank you · CONTECNOW</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--dark:#17233A;--gray:#6B6B6B;--light:#F4F3F0;--white:#FFFFFF;--accent2:#4A8FA8;--border:rgba(0,0,0,0.10);--fd:'DM Serif Display',serif;--fb:'DM Sans',sans-serif;}
body{font-family:var(--fb);background:var(--light);min-height:100vh;display:flex;flex-direction:column;}
.nav{display:flex;align-items:center;justify-content:space-between;padding:16px 40px;border-bottom:0.5px solid var(--border);background:var(--white);}
.nav img{height:44px;width:auto;}
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 20px;}
.card{background:var(--white);border:0.5px solid var(--border);border-radius:4px;padding:56px 48px;max-width:520px;width:100%;text-align:center;}
.check{width:56px;height:56px;border-radius:50%;background:rgba(74,143,168,0.10);display:flex;align-items:center;justify-content:center;margin:0 auto 24px;}
h1{font-family:var(--fd);font-size:32px;font-weight:400;color:var(--dark);margin-bottom:14px;line-height:1.2;}
h1 em{font-style:italic;color:var(--gray);}
p{font-size:15px;color:var(--gray);line-height:1.7;margin-bottom:32px;}
.btn{display:inline-block;background:var(--dark);color:var(--white);padding:12px 28px;border-radius:2px;font-size:14px;font-weight:500;text-decoration:none;transition:opacity .2s;}
.footer-strip{padding:20px 40px;border-top:0.5px solid var(--border);text-align:center;}
.footer-strip p{font-size:11px;color:var(--gray);}
</style>
</head>
<body>
<nav class="nav">
  <img src="../assets/contecnow-logo.png" alt="CONTECNOW"/>
</nav>
<main class="main">
  <div class="card">
    <div class="check">
      <svg viewBox="0 0 28 28" fill="none" width="28" height="28"><path d="M6 14 L11 19 L22 9" stroke="#4A8FA8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h1>Request received<br><em>successfully.</em></h1>
    <p>Our team will review your enquiry and contact you within 48 working hours with a personalised proposal.</p>
    <a href="index.html" class="btn">Back to home</a>
  </div>
</main>
<div class="footer-strip">
  <p>© 2026 CONTECNOW · Official Wacom Partner · Spain</p>
</div>
</body>
</html>
